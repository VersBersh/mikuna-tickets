<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mikuna Receipts</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="shell-header">
      <div>
        <h1>Mikuna Receipts</h1>
        <p id="status">Loading...</p>
      </div>
    </header>

    <nav class="tabs" id="mainTabs" aria-label="Main views">
      <button class="tab active" data-view="order" type="button">New Order</button>
      <span class="ticket-tabs" id="ticketTabs"></span>
      <button class="tab" data-view="tickets" type="button">Open Tickets</button>
      <button class="tab" data-view="menu" type="button">Menu</button>
      <button class="tab" data-view="seating" type="button">Seating</button>
      <button class="tab" data-view="totals" type="button">Totals</button>
      <button class="tab" data-view="events" type="button">Past Events</button>
    </nav>

    <main class="content">
      <section class="view active" id="view-order">
        <div class="grid two">
          <section class="surface" id="ticketSurface">
            <div class="surface-title">
              <h2 id="orderTitle">New ticket</h2>
              <div class="title-actions">
                <button id="clearOrder" type="button">Clear</button>
                <button class="accent" id="saveAction" type="button">Save ticket</button>
              </div>
            </div>
            <div id="ticketBanner" class="banner hidden"></div>
            <label class="field new-only">
              <span>Table or person</span>
              <input id="tableNo" autocomplete="off" placeholder="I2, O8, Sarah">
            </label>
            <div id="menuList" class="menu-list"></div>
            <label class="field new-only">
              <span>Note</span>
              <input id="orderNote" autocomplete="off" placeholder="Allergy, table moved, name">
            </label>
          </section>

          <section class="surface" id="paymentSurface">
            <div class="surface-title">
              <h2 id="paymentTitle">Payment</h2>
              <button id="addSplit" type="button">Add split</button>
            </div>
            <div id="splits" class="splits"></div>
            <div class="payment-summary">
              <div><span>Total due</span><strong id="orderSubtotal">$0.00</strong></div>
              <div><span>Tips</span><strong id="orderTips">$0.00</strong></div>
              <div><span>Total with tip</span><strong id="orderTotal">$0.00</strong></div>
              <div><span>Change</span><strong id="orderChange">$0.00</strong></div>
            </div>
          </section>
        </div>
      </section>

      <section class="view" id="view-tickets">
        <section class="surface">
          <div class="surface-title">
            <h2>Find open ticket</h2>
            <label class="check"><input id="openOnly" type="checkbox" checked> Open only</label>
          </div>
          <input id="ticketSearch" class="search" autocomplete="off" placeholder="Search table, note, F, vegan, tres leches">
          <div class="surface-title tight">
            <h2>Item filters</h2>
            <button id="clearTicketFilters" type="button">Clear filters</button>
          </div>
          <div id="ticketFilters" class="ticket-filters"></div>
          <div id="ticketList" class="ticket-list"></div>
        </section>
      </section>

      <section class="view" id="view-menu">
        <div class="grid two">
          <section class="surface">
            <div class="surface-title"><h2>Add menu item</h2></div>
            <div class="menu-form">
              <label class="field"><span>Code</span><input id="menuCode" placeholder="W"></label>
              <label class="field"><span>Name</span><input id="menuName" placeholder="Wine"></label>
              <label class="field"><span>Price</span><input id="menuPrice" type="number" min="0" step="0.01"></label>
              <button class="accent" id="addMenuItem" type="button">Save item</button>
            </div>
          </section>
          <section class="surface">
            <div class="surface-title"><h2>Current menu</h2></div>
            <div id="menuEditor" class="menu-editor"></div>
          </section>
        </div>
      </section>

      <section class="view" id="view-seating">
        <section class="surface">
          <div class="surface-title"><h2>Seating chart</h2></div>
          <div class="floorplan-wrap">
            <img src="/floorplan.png" alt="Event seating chart">
          </div>
        </section>
      </section>

      <section class="view" id="view-totals">
        <div class="grid two">
          <section class="surface">
            <div class="surface-title">
              <h2>Event totals</h2>
              <button id="refresh" type="button">Refresh</button>
            </div>
            <div class="metrics" id="metrics"></div>
            <div class="cash-settings">
              <label class="field"><span>Opening cash</span><input id="openingCash" type="number" min="0" step="0.01"></label>
              <label class="field"><span>Cash counted</span><input id="actualCash" type="number" min="0" step="0.01"></label>
              <button id="saveSettings" type="button">Save cash</button>
            </div>
          </section>
          <section class="surface">
            <div class="surface-title"><h2>Sold</h2></div>
            <div id="soldList" class="sold-list"></div>
          </section>
        </div>
      </section>

      <section class="view" id="view-events">
        <section class="surface">
          <div class="surface-title"><h2>Past events</h2></div>
          <div id="eventList" class="event-list"></div>
        </section>
      </section>
    </main>

    <template id="splitTemplate">
      <div class="split">
        <div class="split-head">
          <strong></strong>
          <div>
            <label class="field percent-field"><span>% split</span><input class="split-percent" type="number" min="0" max="100" step="1" placeholder="50"></label>
            <button class="apply-percent" type="button">Apply %</button>
            <button class="fill-split" type="button">All remaining</button>
            <button class="remove-split" type="button">Remove</button>
          </div>
        </div>
        <div class="allocations"></div>
        <div class="split-grid">
          <label class="field">
            <span>Method</span>
            <select class="method">
              <option value="cash">Cash</option>
              <option value="paypal">PayPal</option>
            </select>
          </label>
          <label class="field"><span>Subtotal</span><input class="split-subtotal" type="number" min="0" step="0.01"></label>
          <label class="field"><span>Total with tip</span><input class="split-total" type="number" min="0" step="0.01"></label>
          <label class="field"><span>Tendered</span><input class="split-tendered" type="number" min="0" step="0.01"></label>
        </div>
        <div class="split-summary">
          <div><span>Split due</span><strong class="split-due">$0.00</strong></div>
          <div><span>Tip</span><strong class="split-tip">$0.00</strong></div>
          <div><span>Change</span><strong class="split-change">$0.00</strong></div>
        </div>
      </div>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
